<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="../../../dist/css/chassis.min.css" rel="stylesheet">
    <title>Datepicker</title>
  </head>
  <body>
    <div class="container py-xlarge">
      <h1>Datepicker <small class="fg-2">Chassis Visual Test</small></h1>

      <hr>

      <h2>Basic Input Datepicker</h2>
      <div class="row mb-large">
        <div class="medium:col-6">
          <label for="basicDatepicker" class="form-label">Select a date</label>
          <input type="text" class="form-control" id="basicDatepicker" data-cx-toggle="datepicker" placeholder="Click to select">
        </div>
      </div>

      <hr>

      <h2>With Min/Max Dates</h2>
      <div class="row mb-large">
        <div class="medium:col-6">
          <label for="minMaxDatepicker" class="form-label">Only dates in 2026</label>
          <input type="text" class="form-control" id="minMaxDatepicker" data-cx-toggle="datepicker" data-cx-date-min="2026-01-01" data-cx-date-max="2026-12-31" placeholder="Select a date in 2026">
        </div>
      </div>

      <hr>

      <h2>Multiple Selection</h2>
      <div class="row mb-large">
        <div class="medium:col-6">
          <label for="multipleDatepicker" class="form-label">Select multiple dates</label>
          <input type="text" class="form-control" id="multipleDatepicker" data-cx-toggle="datepicker" data-cx-selection-mode="multiple" placeholder="Click to select multiple">
        </div>
      </div>

      <hr>

      <h2>Range Selection</h2>
      <div class="row mb-large">
        <div class="medium:col-6">
          <label for="rangeDatepicker" class="form-label">Select a date range</label>
          <input type="text" class="form-control" id="rangeDatepicker" data-cx-toggle="datepicker" data-cx-selection-mode="multiple-ranged" placeholder="Select start and end">
        </div>
      </div>

      <hr>

      <h2>Week Numbers</h2>
      <div class="row mb-large">
        <div class="medium:col-6">
          <label for="weekNumbersDatepicker" class="form-label">With week numbers</label>
          <input type="text" class="form-control" id="weekNumbersDatepicker" data-cx-toggle="datepicker" data-cx-show-week-numbers="true" placeholder="Select a date">
        </div>
      </div>

      <hr>

      <h2>Sunday First</h2>
      <div class="row mb-large">
        <div class="medium:col-6">
          <label for="sundayFirstDatepicker" class="form-label">Week starts on Sunday</label>
          <input type="text" class="form-control" id="sundayFirstDatepicker" data-cx-toggle="datepicker" data-cx-first-weekday="0" placeholder="Select a date">
        </div>
      </div>

      <hr>

      <h2>Dark Mode</h2>
      <div class="row mb-large" data-cx-theme="dark">
        <div class="medium:col-6">
          <div class="p-large bg-dark rounded">
            <label for="darkDatepicker" class="form-label text-light">Dark mode datepicker</label>
            <input type="text" class="form-control" id="darkDatepicker" data-cx-toggle="datepicker" placeholder="Select a date">
          </div>
        </div>
      </div>

      <hr>

      <h2>JavaScript Initialization</h2>
      <div class="row mb-large">
        <div class="medium:col-6">
          <label for="jsDatepicker" class="form-label">Initialized via JavaScript</label>
          <input type="text" class="form-control" id="jsDatepicker" placeholder="Click to select">
          <div class="mt-small">
            <button type="button" class="button primary small" id="showBtn">Show</button>
            <button type="button" class="button secondary small" id="hideBtn">Hide</button>
            <button type="button" class="button info small" id="getDatesBtn">Get Dates</button>
          </div>
          <div id="selectedDatesOutput" class="mt-small fg-2"></div>
        </div>
      </div>

      <hr>

      <h2>Events Test</h2>
      <div class="row mb-large">
        <div class="medium:col-6">
          <label for="eventsDatepicker" class="form-label">Events datepicker</label>
          <input type="text" class="form-control" id="eventsDatepicker" data-cx-toggle="datepicker" placeholder="Select a date">
          <div id="eventsLog" class="mt-small p-small bg-light border rounded" style="min-height: 100px; font-family: monospace; font-size: 12px; white-space: pre-wrap;"></div>
        </div>
      </div>

    </div>

    <script type="module">
      import * as chassis from '../../../dist/js/chassis.bundle.js'

      // Initialize via JavaScript
      const jsDatepickerEl = document.getElementById('jsDatepicker')
      const jsDatepicker = new chassis.Datepicker(jsDatepickerEl, {
        firstWeekday: 1,
        selectedDates: ['2026-01-15']
      })

      document.getElementById('showBtn').addEventListener('click', () => {
        jsDatepicker.show()
      })

      document.getElementById('hideBtn').addEventListener('click', () => {
        jsDatepicker.hide()
      })

      document.getElementById('getDatesBtn').addEventListener('click', () => {
        const dates = jsDatepicker.getSelectedDates()
        document.getElementById('selectedDatesOutput').textContent = `Selected: ${dates.length ? dates.join(', ') : 'None'}`
      })

      // Events test
      const eventsDatepickerEl = document.getElementById('eventsDatepicker')
      const eventsLog = document.getElementById('eventsLog')

      function logEvent(eventName, detail) {
        const timestamp = new Date().toLocaleTimeString()
        const detailStr = detail ? ` - ${JSON.stringify(detail)}` : ''
        eventsLog.textContent += `[${timestamp}] ${eventName}${detailStr}\n`
        eventsLog.scrollTop = eventsLog.scrollHeight
      }

      eventsDatepickerEl.addEventListener('show.cx.datepicker', () => {
        logEvent('show.cx.datepicker')
      })

      eventsDatepickerEl.addEventListener('shown.cx.datepicker', () => {
        logEvent('shown.cx.datepicker')
      })

      eventsDatepickerEl.addEventListener('hide.cx.datepicker', () => {
        logEvent('hide.cx.datepicker')
      })

      eventsDatepickerEl.addEventListener('hidden.cx.datepicker', () => {
        logEvent('hidden.cx.datepicker')
      })

      eventsDatepickerEl.addEventListener('change.cx.datepicker', event => {
        logEvent('change.cx.datepicker', { dates: event.dates })
      })
    </script>
  </body>
</html>
